<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Prachi \u2014 Part 1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #c8607a;
  --rose-light: #e8a0b0;
  --rose-dim: rgba(200, 96, 122, 0.15);
  --dark: #0b0810;
  --text: rgba(235, 215, 220, 0.82);
  --text-bright: rgba(245, 228, 232, 0.95);
  --text-dim: rgba(200, 180, 190, 0.5);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Lora', serif;
  overflow-x: hidden;
}

/* PARTICLES */
#particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%;
  background: rgba(200, 96, 122, 0.12);
  animation: float linear infinite;
}
@keyframes float {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* HERO */
#hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center; position: relative;
  z-index: 1; padding: 40px 24px;
}
.hero-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(200,96,122,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.eyebrow {
  font-size: 11px; letter-spacing: 6px;
  color: var(--text-dim); text-transform: uppercase;
  margin-bottom: 28px; animation: fadeUp 1s ease 0.3s both;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(52px, 12vw, 96px);
  font-weight: 400; font-style: italic;
  color: var(--text-bright); line-height: 1.05;
  letter-spacing: -1px; margin-bottom: 12px;
  animation: fadeUp 1s ease 0.5s both;
}
.hero-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 6vw, 52px);
  color: var(--rose-light); letter-spacing: 4px;
  margin-bottom: 48px; animation: fadeUp 1s ease 0.7s both;
}
.hero-line {
  width: 1px; height: 80px;
  background: linear-gradient(to bottom, transparent, rgba(200,96,122,0.4), transparent);
  margin: 0 auto 32px; animation: fadeUp 1s ease 0.9s both;
}
.hero-tagline {
  font-size: 16px; font-style: italic;
  color: var(--text-dim); animation: fadeUp 1s ease 1.1s both;
}
.scroll-hint {
  position: absolute; bottom: 36px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: fadeUp 1s ease 1.5s both;
}
.scroll-hint span { font-size: 10px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; }
.scroll-arrow {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, var(--rose-dim), transparent);
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* SECTIONS */
section { position: relative; z-index: 1; }

/* INTRO */
#intro { padding: 120px 24px; max-width: 680px; margin: 0 auto; text-align: center; }
.section-label {
  font-size: 10px; letter-spacing: 5px;
  color: var(--rose); text-transform: uppercase;
  margin-bottom: 36px; opacity: 0.7;
}
.intro-text {
  font-size: clamp(17px, 2.5vw, 21px);
  line-height: 2; color: var(--text); font-style: italic;
}
.intro-text strong { color: var(--text-bright); font-style: normal; font-weight: 400; }
.intro-reveal {
  margin-top: 60px; padding: 40px;
  border: 1px solid rgba(200,96,122,0.12);
  background: rgba(200,96,122,0.03); position: relative;
}
.intro-reveal::before {
  content: ''; position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 40px; height: 1px; background: var(--rose); opacity: 0.4;
}
.intro-reveal p {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 3vw, 26px);
  font-style: italic; color: var(--text-bright); line-height: 1.7;
}

/* DIVIDER */
.ornament-divider {
  display: flex; align-items: center; gap: 20px;
  padding: 0 40px; max-width: 680px; margin: 0 auto;
}
.ornament-divider hr { flex: 1; border: none; border-top: 1px solid rgba(200,96,122,0.1); }
.ornament-divider .sym { color: rgba(200,96,122,0.3); font-size: 12px; letter-spacing: 6px; }

/* REASONS */
#reasons { padding: 100px 24px; max-width: 720px; margin: 0 auto; }
#reasons .section-label { text-align: center; display: block; margin-bottom: 64px; }
.reason-item {
  display: grid; grid-template-columns: 40px 1fr;
  gap: 24px; align-items: start; margin-bottom: 48px;
  opacity: 0; transform: translateX(-20px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reason-item.visible { opacity: 1; transform: translateX(0); }
.reason-num {
  font-family: 'Playfair Display', serif; font-size: 11px;
  color: rgba(200,96,122,0.4); letter-spacing: 1px;
  padding-top: 4px; text-align: right;
}
.reason-text {
  font-size: 17px; line-height: 1.9; color: var(--text);
  border-left: 1px solid rgba(200,96,122,0.12); padding-left: 24px;
}
.reason-text em { color: var(--rose-light); font-style: italic; }

/* CONTINUED TAG */
.continued {
  text-align: center; padding: 60px 24px 80px;
  position: relative; z-index: 1;
}
.continued p {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 15px;
  color: rgba(200,96,122,0.45); letter-spacing: 3px;
}

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal {
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 600px) {
  .reason-item { grid-template-columns: 28px 1fr; gap: 16px; }
  .reason-text { padding-left: 16px; }
}
</style>
</head>
<body>

<div id="particles"></div>

<!-- HERO -->
<section id="hero">
  <div class="hero-glow"></div>
  <p class="eyebrow">a love letter</p>
  <h1 class="hero-title">Why Her?</h1>
  <p class="hero-name">Prachi</p>
  <div class="hero-line"></div>
  <p class="hero-tagline">out of everyone\u2026 it's always you</p>
  <div class="scroll-hint">
    <span>read</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- INTRO -->
<section id="intro">
  <p class="section-label reveal">the question</p>
  <p class="intro-text reveal">
    They asked me \u2014 <strong>why do you love her so much.</strong><br>
    What's so special about her.<br><br>
    I sat down. Stayed quiet for a few minutes.
